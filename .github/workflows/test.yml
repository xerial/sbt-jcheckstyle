name: CI

on:
  pull_request:
    paths:
      - '**.scala'
      - '**.java'
      - '**.sbt'
      - '.scalafmt.conf'
      - '.github/workflows/test.yml'
  push:
    branches:
      - master
    paths:
      - '**.scala'
      - '**.java'
      - '**.sbt'
      - '.scalafmt.conf'

jobs:
  code_format:
    name: Code format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: scalafmt check
        run: ./sbt scalafmtCheckAll scalafmtSbtCheck

  test_sbt2_plugin:
    name: plugin test (sbt 2.x)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            distribution: temurin
            java: 21
          - os: ubuntu-latest
            distribution: temurin
            java: 24
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "${{ matrix.distribution }}"
          java-version: "${{ matrix.java }}"
      - name: scripted tests (sbt 2.x)
        run: ./sbt scripted
