name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
  - title: '👋 Deprecated'
    labels:
      - 'deprecation'
  - title: '⛓  Dependency Updates'
    labels:
      - 'library-update'
      - 'test-library-update'
      - 'sbt-plugin-update'
      - 'dependencies'
  - title: '🛠  Internal Updates'
    labels:
      - 'internal'
      - 'kaizen'
  - title: '📚 Docs'
    labels:
      - 'doc'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...$RESOLVED_VERSION

autolabeler:
  - label: 'doc'
    files:
      - '*.md'
  - label: 'bug'
    title:
      - '/fix/i'
  - label: 'internal'
    title:
      - '/internal/i'
  - label: 'deprecation'
    title:
      - '/deprecate/i'
